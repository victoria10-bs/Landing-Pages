name: Despliegue Automatizado

on:
  push:
    branches:
      - main

# Permisos necesarios para interactuar con GitHub Pages directamente
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Compilar proyecto (Build)
        run: npm run build

      - name: Subir artefacto para Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # Sube la carpeta compilada de Vite

      - name: Desplegar en GitHub Pages
        uses: actions/deploy-pages@v4